<!DOCTYPE html>
<html>
<head>
    <title>SmartSense Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f8fafc; color: #1e293b; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat { font-size: 2.5em; font-weight: bold; color: #6366f1; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 1.1em; }
        th, td { border-bottom: 1px solid #f1f5f9; padding: 15px; text-align: left; }
        th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.9em; letter-spacing: 0.05em; }
        button { padding: 12px 24px; cursor: pointer; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: bold; margin-right: 10px; font-size: 1em; transition: all 0.2s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .badge { background: #dcfce7; color: #166534; padding: 6px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-left: 5px solid #6366f1; }
        h2, h3 { margin: 0; }
    </style>
</head>
<body>
    <div class="card header">
        <h2>SmartSense Dashboard</h2>
        <div>
            <span id="userInfo" style="margin-right:25px; color: #475569; font-weight:500"></span>
            <button id="btnRecognition" onclick="fetch('/api/open-camera', {method:'POST'})">Start Recognition</button>
            <button onclick="load()" style="background:#3b82f6">Sync Data</button>
            <button id="btnReport" onclick="location.href='/api/download'" style="background:#64748b">Report</button>
            <button onclick="logout()" style="background:#ef4444">Logout</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Engagement Metrics</h3>
            <p style="color: #64748b;">Total Students Present Today</p>
            <div id="total" class="stat">0</div>
        </div>
        <div class="card">
            <h3>Attendance Log</h3>
            <table>
                <thead><tr><th>Student</th><th>Timestamp</th><th>Status</th><th>Engagement</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const role = localStorage.getItem('role');
        const user = localStorage.getItem('user');
        if (!role) location.href = '/login.html';
        document.getElementById('userInfo').innerText = `${user} (${role})`;
        
        // Simplified Logic: Admin removed, Teacher is the privileged role
        if (role === 'Student') {
            document.getElementById('btnRecognition').style.display = 'none';
            document.getElementById('btnReport').style.display = 'none';
        }

        function load() {
            fetch('/api/attendance').then(r => r.json()).then(data => {
                document.getElementById('list').innerHTML = data.map(r => 
                    `<tr><td><b>${r.name}</b></td><td>${r.time}</td>
                     <td><span class="badge" style="background:#e0f2fe; color:#0369a1">${r.status}</span></td>
                     <td><span class="badge">${r.engagement}</span></td></tr>`).join('');
                document.getElementById('total').innerText = data.length;
            });
        }
        function logout() { localStorage.clear(); location.href = '/login.html'; }
        setInterval(load, 3000); load();
    </script>
</body>
</html>
