<!DOCTYPE html>
<html>
<head>
    <title>SmartSense Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); margin: 0; }
        .card { background: white; padding: 50px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 380px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 30px; font-size: 2.2em; font-weight: 800; }
        input, select, button { width: 100%; padding: 18px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 1.25em; transition: all 0.3s; }
        input:focus, select:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
        button { background: #6366f1; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 1.4em; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        button:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4); }
        .subtitle { color: #64748b; font-size: 1.2em; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SmartSense</h2>
        <p class="subtitle">Secure Attendance Login</p>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <select id="role">
                <option value="Teacher">Teacher</option>
                <option value="Student">Student</option>
            </select>
            <button type="submit">Unlock Dashboard</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem('role', document.getElementById('role').value);
            localStorage.setItem('user', document.getElementById('user').value);
            location.href = '/index.html';
        };
    </script>
</body>
</html>
