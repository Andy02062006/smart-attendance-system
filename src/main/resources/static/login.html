<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSense | Professional Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>SmartSense</h1>
            <p class="subtitle">AI-Powered Attendance & Engagement</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="role">Access Role</label>
                    <select id="role" class="styled-select">
                        <option value="admin">System Administrator</option>
                        <option value="teacher">Faculty Member</option>
                        <option value="student">Student Portal</option>
                    </select>
                </div>

                <button type="submit" class="login-btn">Unlock Secure Portal</button>
            </form>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
