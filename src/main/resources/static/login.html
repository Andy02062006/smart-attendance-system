<!DOCTYPE html>
<html>
<head>
    <title>SmartSense Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #6366f1; color: white; border: none; font-weight: bold; cursor: pointer; }
        h2 { color: #1e293b; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SmartSense Login</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <select id="role">
                <option value="Admin">Administrator</option>
                <option value="Teacher">Teacher</option>
                <option value="Student">Student</option>
            </select>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem('role', document.getElementById('role').value);
            localStorage.setItem('user', document.getElementById('user').value);
            location.href = '/index.html';
        };
    </script>
</body>
</html>
